site_name: tiledpy
site_description: TMX map loader using Pillow for sprite detection and Pygame for rendering
site_author: tiledpy contributors
docs_dir: docs
repo_url: https://github.com/Aouei/tiledpy

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
            members_order: source
            show_bases: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture.md
      - Interactions: interaction.md
  - API Reference:
      - TiledMap: api/tiledmap.md
      - Tileset: api/tileset.md
      - Layers: api/layer.md
      - Renderer: api/renderer.md
  - User Guide:
      - Complete Pygame Example: guide/pygame_example.md
